<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .split-hero {
  display: flex;
  min-height: 650px;
  width: 100%;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
}

.split-left {
  flex: 1;
  background-color: #0f172a;
  padding: 60px;
  color: white;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
}

.split-left::before {
  content: '';
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(79, 70, 229, 0.2) 0%, rgba(124, 58, 237, 0.1) 100%);
  top: -150px;
  left: -150px;
  filter: blur(60px);
  z-index: 1;
}

.split-left::after {
  content: '';
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(244, 114, 182, 0.15) 0%, rgba(251, 113, 133, 0.05) 100%);
  bottom: -100px;
  right: -100px;
  filter: blur(40px);
  z-index: 1;
}

.split-content {
  position: relative;
  z-index: 2;
  max-width: 500px;
}

.split-text-wrapper {
  margin-bottom: 40px;
}

.split-heading {
  font-size: 3.8rem;
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 25px;
  overflow: hidden;
}

.heading-line {
  display: block;
  transform: translateY(100%);
  opacity: 0;
  animation: slideUp 0.8s forwards cubic-bezier(0.5, 0, 0.1, 1);
}

.heading-line:nth-child(1) {
  animation-delay: 0.2s;
}

.heading-line:nth-child(2) {
  animation-delay: 0.4s;
}

.heading-line:nth-child(3) {
  animation-delay: 0.6s;
}

.highlight {
  position: relative;
  display: inline-block;
  color: transparent;
  -webkit-background-clip: text;
  background-clip: text;
  background-image: linear-gradient(135deg, #4f46e5, #ec4899);
}

.highlight::after {
  content: '';
  position: absolute;
  left: 0;
  bottom: 5px;
  width: 100%;
  height: 8px;
  background-image: linear-gradient(135deg, #4f46e5, #ec4899);
  opacity: 0.3;
  z-index: -1;
}

.split-description {
  font-size: 1.1rem;
  line-height: 1.7;
  color: rgba(255, 255, 255, 0.8);
  margin-bottom: 30px;
  max-width: 450px;
  transform: translateY(20px);
  opacity: 0;
  animation: fadeUp 0.8s forwards cubic-bezier(0.5, 0, 0.1, 1) 0.8s;
}

.split-cta {
  display: flex;
  align-items: center;
  gap: 25px;
  margin-bottom: 50px;
  transform: translateY(20px);
  opacity: 0;
  animation: fadeUp 0.8s forwards cubic-bezier(0.5, 0, 0.1, 1) 1s;
}

.split-button {
  display: inline-block;
  padding: 15px 30px;
  background-image: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-weight: 600;
  transition: all 0.3s ease;
  box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
  position: relative;
  overflow: hidden;
}

.split-button::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(135deg, #4338ca, #6d28d9);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.split-button:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 30px rgba(79, 70, 229, 0.4);
}

.split-button:hover::before {
  opacity: 1;
}

.play-button {
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.play-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background-color: rgba(255, 255, 255, 0.1);
  position: relative;
  transition: all 0.3s ease;
}

.play-icon::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 55%;
  transform: translate(-50%, -50%);
  width: 0;
  height: 0;
  border-style: solid;
  border-width: 8px 0 8px 12px;
  border-color: transparent transparent transparent white;
}

.play-button:hover .play-icon {
  background-color: rgba(255, 255, 255, 0.2);
  transform: scale(1.1);
}

.split-stats {
  display: flex;
  align-items: center;
  gap: 30px;
  transform: translateY(20px);
  opacity: 0;
  animation: fadeUp 0.8s forwards cubic-bezier(0.5, 0, 0.1, 1) 1.2s;
}

.stat-item {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.stat-number {
  font-size: 2rem;
  font-weight: 700;
  color: white;
  background: linear-gradient(135deg, #4f46e5, #ec4899);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.stat-label {
  font-size: 0.9rem;
  color: rgba(255, 255, 255, 0.7);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.stat-divider {
  width: 1px;
  height: 40px;
  background-color: rgba(255, 255, 255, 0.2);
}

.split-right {
  flex: 1;
  background-color: #f8fafc;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px;
  overflow: hidden;
}

.image-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 20px;
  width: 100%;
  max-width: 600px;
  aspect-ratio: 1/1;
}

.grid-item {
  border-radius: 15px;
  overflow: hidden;
  background-size: cover;
  background-position: center;
  box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
  transform: scale(0.8);
  opacity: 0;
  animation: scaleIn 0.8s forwards cubic-bezier(0.5, 0, 0.1, 1);
}

.item1 {
  background-image: url('https://images.unsplash.com/photo-1549921296-bc643ead1e65?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=400&h=400&q=80');
  animation-delay: 0.3s;
}

.item2 {
  background-image: url('https://images.unsplash.com/photo-1618005198919-d3d4b5a92ead?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=400&h=400&q=80');
  animation-delay: 0.5s;
}

.item3 {
  background-image: url('https://images.unsplash.com/photo-1545235617-9465d2a55698?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=400&h=400&q=80');
  animation-delay: 0.7s;
}

.item4 {
  background-image: url('https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=400&h=400&q=80');
  animation-delay: 0.9s;
}

@keyframes slideUp {
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

@keyframes fadeUp {
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

@keyframes scaleIn {
  to {
    transform: scale(1);
    opacity: 1;
  }
}

@media (max-width: 992px) {
  .split-hero {
    flex-direction: column;
  }
  
  .split-left, .split-right {
    padding: 40px 20px;
  }
  
  .split-heading {
    font-size: 3rem;
  }
  
  .split-stats {
    flex-wrap: wrap;
    gap: 20px;
  }
  
  .stat-divider {
    display: none;
  }
  
  .split-left::before, .split-left::after {
    display: none;
  }
}
    </style>
</head>
<body>
    <section class="split-hero">
  <div class="split-left">
    <div class="split-content">
      <div class="split-text-wrapper">
        <h1 class="split-heading">
          <span class="heading-line">Creative</span>
          <span class="heading-line">Design</span>
          <span class="heading-line highlight">Solutions</span>
        </h1>
        <p class="split-description">We blend innovation and design to create meaningful digital experiences that connect with your audience.</p>
      </div>
      <div class="split-cta">
        <a href="#" class="split-button">Our Work</a>
        <div class="play-button">
          <div class="play-icon"></div>
          <span>Watch Reel</span>
        </div>
      </div>
      <div class="split-stats">
        <div class="stat-item">
          <span class="stat-number">250+</span>
          <span class="stat-label">Projects</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-number">120+</span>
          <span class="stat-label">Clients</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-number">15+</span>
          <span class="stat-label">Awards</span>
        </div>
      </div>
    </div>
  </div>
  <div class="split-right">
    <div class="image-grid">
      <div class="grid-item item1"></div>
      <div class="grid-item item2"></div>
      <div class="grid-item item3"></div>
      <div class="grid-item item4"></div>
    </div>
  </div>
</section>
</body>
</html>
